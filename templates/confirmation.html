<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; text-align: center; border: 1px solid #ddd; border-radius: 10px; }
        .success { color: #28a745; font-size: 1.5em; margin-bottom: 20px; }
        .details { text-align: left; margin: 20px 0; padding: 15px; background-color: #f9f9f9; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="success">Booking Confirmed!</div>
    <div class="details">
        <p><strong>Name:</strong> {{ name }}</p>
        <p><strong>Date:</strong> {{ date }}</p>
        <p><strong>Time:</strong> {{ time }}</p>
        <p><strong>Venue:</strong> {{ venue }}</p>
    </div>
    <p><a href="{{ url_for('index') }}">Back to Home</a></p>
</body>
</html>
